services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefeitura
      POSTGRES_PASSWORD: prefeitura123
      POSTGRES_DB: painel_social
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefeitura -d painel_social"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://prefeitura:prefeitura123@postgres:5432/painel_social?sslmode=disable
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: 8080
      SEED_FILE: /app/data/seed.json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
